databases:
  - name: humanai-db
    databaseName: humanai
    user: crayond

services:
  # API Backend
  - type: web
    name: humanai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: humanai-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

  # Background Agent Worker
  - type: worker
    name: humanai-agent
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python src/agent.py dev
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: humanai-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Static Site
  - type: web
    name: humanai-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
